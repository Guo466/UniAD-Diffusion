# lightning.pytorch==2.4.0
seed_everything: 42
# self defined args for fit
trainer:
  accelerator: auto  # [gpu,cpu,auto]
  strategy: auto  # [auto,ddp]
  devices: auto
  num_nodes: 4
  precision: null
  fast_dev_run: false
  max_epochs: 80
  min_epochs: null
  max_steps: -1
  min_steps: null
  max_time: null
  limit_train_batches: null
  limit_val_batches: null
  limit_test_batches: null
  limit_predict_batches: null
  overfit_batches: 0.0
  val_check_interval: null
  check_val_every_n_epoch: 1
  num_sanity_val_steps: null
  log_every_n_steps: null
  enable_checkpointing: null
  enable_progress_bar: True
  enable_model_summary: null
  accumulate_grad_batches: 1
  gradient_clip_val: 1.0
  gradient_clip_algorithm: null
  deterministic: null
  benchmark: null
  inference_mode: true
  use_distributed_sampler: true
  profiler: null
  detect_anomaly: false
  barebones: false
  plugins: null
  sync_batchnorm: false
  reload_dataloaders_every_n_epochs: 0
  default_root_dir: null
model:
  class_path: models.LitMMDiTDiffusionModel
  init_args:
    config: null
    lr: 0.001
    warmup_steps: 1
    warmup_interval: epoch # step or epoch
data:
  class_path: datasets.LitDiffusionDataset
  init_args:
    config: LitDiffusionDataset_ego_navi.yaml
    batch_size: 192
    num_workers: 128
ckpt_path: null
